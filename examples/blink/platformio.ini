; Requires: PlatformIO >= 6.0, avr-gcc >= 7.3 (C++17), Arduino framework
[platformio]
default_envs = uno

[env:uno]
platform = atmelavr@^4.0.0
board = uno
framework = arduino
build_unflags =
    -std=c++11
    -std=c++14
    -std=c++20
    -std=c++2a
    -std=gnu++11
    -std=gnu++14
    -std=gnu++20
    -std=gnu++2a
    -std=gnu++1z
build_flags =
    -std=gnu++17
    -I../../include
    -I../../../HAPI/include
    -I../../../OnePin/include
upload_port = /dev/ttyUSB*
