[platformio]

[env:tiny]
platform = atmelavr@^4.0.0
board = attiny45
framework = arduino
upload_port = /dev/ttyACM0
build_flags = -std=c++17
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
lib_deps =
	https://github.com/InternetOfPins/HAPI.git
	https://github.com/InternetOfPins/OneData.git
	https://github.com/InternetOfPins/OneOutput.git
	https://github.com/InternetOfPins/OneItem.git
	https://github.com/InternetOfPins/OneBit.git
	https://github.com/InternetOfPins/OnePin.git
	https://github.com/InternetOfPins/OneInput.git
	https://github.com/InternetOfPins/OneMenu.git
	https://github.com/InternetOfPins/OneBus.git
	https://github.com/InternetOfPins/OneChip.git

