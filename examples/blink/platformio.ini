; Requires: PlatformIO >= 6.0, avr-gcc >= 7.3 (C++17), Arduino framework
[platformio]
default_envs = uno

[env:uno]
platform = atmelavr@^4.0.0
board = uno
framework = arduino
build_flags =
    -std=gnu++17
    -I../../include
    -I../../../HAPI/include
    -I../../../OnePin/include
upload_port = /dev/ttyUSB*
