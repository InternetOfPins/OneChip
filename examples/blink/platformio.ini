; Requires: PlatformIO >= 6.0, avr-gcc >= 7.3 (C++17)
[platformio]
default_envs = avr

[common]
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
build_flags = -std=c++17 -DIOP
lib_deps =
    HAPI    = symlink://../../../HAPI
    OneBit  = symlink://../../../OneBit
    OnePin  = symlink://../../../OnePin
    OneChip = symlink://../../

[env:avr]
platform = atmelavr@^4.0.0
board = uno
upload_port = /dev/ttyACM0
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags}
lib_deps      = ${common.lib_deps}

[env:uno]
platform = atmelavr@^4.0.0
board = uno
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags}
lib_deps      = ${common.lib_deps}
