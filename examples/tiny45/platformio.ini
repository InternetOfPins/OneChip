[platformio]

[env:uno]
platform = atmelavr@^4.0.0
board = uno
framework = arduino
upload_port = /dev/ttyACM0
build_flags = -std=c++17
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
lib_deps =
	HAPI     =symlink://../../../../IOP/HAPI
	OneData  =symlink://../../../../IOP/OneData
	OneOutput=symlink://../../../../IOP/OneOutput
	OneItem  =symlink://../../../../IOP/OneItem
	OneBit   =symlink://../../../../IOP/OneBit
	OnePin   =symlink://../../../../IOP/OnePin
	OneInput =symlink://../../../../IOP/OneInput
	OneMenu  =symlink://../../../../IOP/OneMenu
  OneBus   =symlink://../../../../IOP/OneBus
  OneChip  =symlink://../../../../IOP/OneChip

[env:tiny]
platform = atmelavr@^4.0.0
board = attiny45
framework = arduino
upload_port = /dev/ttyACM0
build_flags = -std=c++17
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
lib_deps =
	HAPI     =symlink://../../../../IOP/HAPI
	OneData  =symlink://../../../../IOP/OneData
	OneOutput=symlink://../../../../IOP/OneOutput
	OneItem  =symlink://../../../../IOP/OneItem
	OneBit   =symlink://../../../../IOP/OneBit
	OnePin   =symlink://../../../../IOP/OnePin
	OneInput =symlink://../../../../IOP/OneInput
	OneMenu  =symlink://../../../../IOP/OneMenu
  OneBus   =symlink://../../../../IOP/OneBus
  OneChip  =symlink://../../../../IOP/OneChip
