; IOP Serial example — bare-metal UART, no framework dependency.
; AVR:    Timer0 tick + USART0 (D0/D1 on Uno)
; STM32:  SysTick + USART1 (PA9/PA10 on Blue Pill) — PLL to 72 MHz from HSE crystal
[platformio]
default_envs = avr

[common]
build_unflags =
    -std=c++11 -std=c++14 -std=c++20 -std=c++2a
    -std=gnu++11 -std=gnu++14 -std=gnu++20 -std=gnu++2a -std=gnu++1z
build_flags = -std=c++17
lib_deps =
    HAPI    = https://github.com/InternetOfPins/HAPI.git@a7e32cb11fefa80e99174e8ccb9b571bac62f6e1
    OneBit  = https://github.com/InternetOfPins/OneBit.git@c57022267bf56fc0ffeb8c5aa7adc1e52eaf7ff1
    OnePin  = https://github.com/InternetOfPins/OnePin.git@67acf0658afc8699b0dd8c4591890b66ef2ce739
    OneBus  = https://github.com/InternetOfPins/OneBus.git@701171a9bdebdccb25f715f610e715b79b15c2e5
    OneChip = https://github.com/InternetOfPins/OneChip.git@7bb584a12e261afe4e5f87c7f4e655ca998605e6

[env:avr]
platform = atmelavr@^4.0.0
board = uno
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 9600
build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags} -DIOP
lib_deps      = ${common.lib_deps}

[env:bluepill_iop]
platform  = ststm32
board     = bluepill_f103c8
framework = cmsis
upload_protocol = stlink
debug_tool      = stlink

build_unflags = ${common.build_unflags}
build_flags   = ${common.build_flags} -DIOP -DSTM32F1xx
lib_deps      = ${common.lib_deps}
